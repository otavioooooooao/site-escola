<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Aluno - Notas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Portal do Aluno 🎓</h1>
        <div class="user-logged-info">
            <p>Olá, <span id="nome-aluno-header">Aluno</span></p>
            <button class="btn-logout" onclick="fazerLogout()">Sair 🚪</button>
        </div>
    </header>

    <main class="main-container">
        <div class="card">
            <h2>Meu Boletim Escolar Oficial</h2>
            
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Disciplina / Matéria</th>
                            <th>Nota 1</th>
                            <th>Nota 2</th>
                            <th>Média Final</th>
                            <th>Situação</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-notas-aluno">
                        <tr>
                            <td colspan="5" style="text-align: center; color: var(--text-muted);">
                                Carregando suas notas do sistema...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

<script>
    const API_BASE = 'https://site-escola-ox6c.onrender.com/api';

    window.onload = function() {
        // Recupera os dados do usuário guardados no login
        const user = JSON.parse(localStorage.getItem('suap_logged'));
        
        // Proteção de página: Se não houver login ou não for aluno, expulsa
        if (!user || !user.nome) {
            alert("Sessão inválida! Por favor, faça login novamente.");
            window.location.href = 'index.html';
            return;
        }

        // Exibe o nome do aluno no cabeçalho
        document.getElementById('nome-aluno-header').textContent = user.nome;

        // Dispara a busca das notas passando o nome correto como filtro
        carregarNotasDoAluno(user.nome);
    };

    async function carregarNotasDoAluno(nomeAluno) {
        const tbody = document.getElementById('tabela-notas-aluno');
        
        try {
            // Envia o parâmetro ?aluno=Nome do Aluno para a API
            const response = await fetch(`${API_BASE}/notas?aluno=${encodeURIComponent(nomeAluno)}`);
            
            if (!response.ok) {
                throw new Error("Erro na resposta do servidor");
            }

            const notas = await response.json();
            tbody.innerHTML = '';

            if (notas.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 20px; color: var(--text-muted);">
                            Nenhuma nota foi lançada para você ainda neste período.
                        </td>
                    </tr>`;
                return;
            }

            // Popula a tabela com as notas encontradas
            notas.forEach(nota => {
                const tr = document.createElement('tr');
                const badgeClass = nota.situacao === 'APROVADO' ? 'badge-aprovado' : 'badge-reprovado';
                
                tr.innerHTML = `
                    <td><strong>${nota.materia}</strong></td>
                    <td>${nota.n1.toFixed(1)}</td>
                    <td>${nota.n2.toFixed(1)}</td>
                    <td><strong>${nota.media.toFixed(1)}</strong></td>
                    <td><span class="badge ${badgeClass}">${nota.situacao}</span></td>
                `;
                tbody.appendChild(tr);
            });

        } catch (e) {
            console.error(e);
            tbody.innerHTML = `
                <tr>
                    <td colspan="5" style="text-align: center; color: var(--danger-color); font-weight: 600; padding: 20px;">
                        ⚠️ Erro ao carregar dados do SGBD. Verifique se o servidor está online.
                    </td>
                </tr>`;
        }
    }

    function fazerLogout() {
        localStorage.removeItem('suap_logged');
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
