<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Aluno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Portal do Aluno - Painel de Notas</h1>
        <div class="user-logged-info">
            Olá, <span id="user-display-name">Nome</span> |
            <button type="button" class="btn-logout" onclick="fazerLogout()">Sair 🚪</button>
        </div>
    </header>

    <div class="main-container">
        <div class="card">
            <div class="boletim-header">
                <h2>Meu Boletim Escolar Oficial</h2>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Disciplina</th>
                        <th>N1</th>
                        <th>N2</th>
                        <th>Média</th>
                        <th>Situação</th>
                    </tr>
                </thead>
                <tbody id="tabela-aluno"></tbody>
            </table>
        </div>
    </div>

    <script>
        const logado = JSON.parse(localStorage.getItem('suap_logged'));
        if (!logado || logado.tipo !== 'aluno') {
            window.location.href = 'index.html';
        } else {
            document.getElementById('user-display-name').innerText = logado.nome;
        }

        document.addEventListener("DOMContentLoaded", atualizarBoletimAluno);

        async function atualizarBoletimAluno() {
            const tabela = document.getElementById('tabela-aluno');
            tabela.innerHTML = '';

            try {
                // Passa o nome do aluno como parâmetro para buscar apenas as notas dele
                const response = await fetch(`https://site-escola-ox6c.onrender.com/api/notas/aluno/${encodeURIComponent(logado.nome)}`);
                const minhasNotas = await response.json();

                if (minhasNotas.length === 0) {
                    tabela.innerHTML = `<tr><td colspan="5" style="text-align:center; color: #777;">Nenhuma nota lançada para si no SGBD ainda.</td></tr>`;
                    return;
                }

                minhasNotas.forEach(item => {
                    const badgeClass = item.situacao === "APROVADO" ? "badge-aprovado" : "badge-reprovado";
                    tabela.innerHTML += `
                    <tr>
                        <td><strong>${item.materia}</strong></td>
                        <td>${item.n1.toFixed(1)}</td>
                        <td>${item.n2.toFixed(1)}</td>
                        <td><strong>${item.media.toFixed(1)}</strong></td>
                        <td><span class="badge ${badgeClass}">${item.situacao}</span></td>
                    </tr>
                `;
                });
            } catch (error) {
                tabela.innerHTML = `<tr><td colspan="5" style="text-align:center; color: red;">Erro ao carregar dados do SGBD.</td></tr>`;
            }
        }

        function fazerLogout() {
            localStorage.removeItem('suap_logged');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
