<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Professor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="panel-container">
    <h2>Painel do Docente 🏫</h2>
    <p>Bem-vindo, Professor(a).</p>
    <hr>

    <h3>Lançar Nova Nota</h3>
    <div class="form-group">
        <label>Nome do Aluno:</label>
        <input type="text" id="nota-aluno" placeholder="Ex: Amanda Duarte">
    </div>
    <div class="form-group">
        <label>Matéria / Disciplina:</label>
        <input type="text" id="nota-materia" placeholder="Ex: Matemática">
    </div>
    <div class="form-inline">
        <div class="form-group">
            <label>Nota 1:</label>
            <input type="number" id="nota-n1" step="0.1" min="0" max="10" placeholder="0.0">
        </div>
        <div class="form-group">
            <label>Nota 2:</label>
            <input type="number" id="nota-n2" step="0.1" min="0" max="10" placeholder="0.0">
        </div>
    </div>
    <button type="button" onclick="professorSalvarNota()">Lançar Nota no Sistema</button>

    <hr>
    <h3>Notas Lançadas no Sistema</h3>
    <table>
        <thead>
            <tr>
                <th>Aluno</th>
                <th>Matéria</th>
                <th>Nota 1</th>
                <th>Nota 2</th>
                <th>Média</th>
                <th>Situação</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabela-notas-professor">
            </tbody>
    </table>
    <br>
    <button onclick="fazerLogout()" style="background-color: #cc0000;">Sair do Sistema</button>
</div>

<script>
    const API_URL = 'https://site-escola-ox6c.onrender.com/api/notas';

    // Executa assim que a página abre para listar as notas existentes
    window.onload = function() {
        const user = JSON.parse(localStorage.getItem('suap_logged'));
        if (!user || user.tipo !== 'professor') {
            alert("Acesso negado! Faça login como professor.");
            window.location.href = 'index.html';
            return;
        }
        carregarNotas();
    };

    async function carregarNotas() {
        try {
            const response = await fetch(API_URL);
            const notas = await response.json();
            
            const tbody = document.getElementById('tabela-notas-professor');
            tbody.innerHTML = '';

            notas.forEach(nota => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${nota.aluno}</td>
                    <td>${nota.materia}</td>
                    <td>${nota.n1.toFixed(1)}</td>
                    <td>${nota.n2.toFixed(1)}</td>
                    <td>${nota.media.toFixed(1)}</td>
                    <td style="color: ${nota.situacao === 'APROVADO' ? 'green' : 'red'}; font-weight: bold;">${nota.situacao}</td>
                    <td><button onclick="apagarNota(${nota.id})" style="background-color: #ff3333; padding: 2px 8px;">🗑️</button></td>
                `;
                tbody.appendChild(tr);
            });
        } catch (e) {
            console.error("Erro ao carregar notas:", e);
        }
    }

    async function professorSalvarNota() {
        const aluno = document.getElementById('nota-aluno').value.trim();
        const materia = document.getElementById('nota-materia').value.trim();
        const n1 = document.getElementById('nota-n1').value;
        const n2 = document.getElementById('nota-n2').value;

        if (!aluno || !materia || n1 === '' || n2 === '') {
            return alert("Por favor, preencha todos os campos e notas.");
        }

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    aluno,
                    materia,
                    n1: parseFloat(n1),
                    n2: parseFloat(n2)
                })
            });

            const dados = await response.json();

            if (!response.ok) {
                return alert(dados.erro || "Erro ao salvar a nota.");
            }

            alert(dados.mensagem || "Nota processada com sucesso!");
            
            // Limpa os campos do formulário
            document.getElementById('nota-aluno').value = '';
            document.getElementById('nota-materia').value = '';
            document.getElementById('nota-n1').value = '';
            document.getElementById('nota-n2').value = '';

            // Atualiza a tabela na hora
            carregarNotas();

        } catch (e) {
            alert("Erro de conexão com o servidor.");
        }
    }

    async function apagarNota(id) {
        if (!confirm("Tem certeza que deseja apagar esta nota?")) return;

        try {
            const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            if (response.ok) {
                alert("Nota excluída!");
                carregarNotas();
            } else {
                alert("Erro ao apagar nota.");
            }
        } catch (e) {
            alert("Erro de conexão.");
        }
    }

    function fazerLogout() {
        localStorage.removeItem('suap_logged');
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
