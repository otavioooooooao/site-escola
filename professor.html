<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Professor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="panel-container">
    <h2>Painel do Docente 🏫</h2>
    <p>Bem-vindo, Professor(a).</p>
    <hr>

    <h3>Lançar Nova Nota</h3>
    <div class="form-group">
        <label>Selecionar Aluno Registado:</label>
        <select id="nota-aluno">
            <option value="">Carregando alunos...</option>
        </select>
    </div>
    <div class="form-group">
        <label>Matéria / Disciplina:</label>
        <input type="text" id="nota-materia" placeholder="Ex: Matemática">
    </div>
    <div class="form-inline">
        <div class="form-group">
            <label>Nota 1:</label>
            <input type="number" id="nota-n1" step="0.1" min="0" max="10" placeholder="0.0">
        </div>
        <div class="form-group">
            <label>Nota 2:</label>
            <input type="number" id="nota-n2" step="0.1" min="0" max="10" placeholder="0.0">
        </div>
    </div>
    <button type="button" onclick="professorSalvarNota()">Lançar Nota no Sistema</button>

    <hr>
    <h3>Notas Lançadas</h3>
    <table>
        <thead>
            <tr>
                <th>Aluno</th>
                <th>Matéria</th>
                <th>Nota 1</th>
                <th>Nota 2</th>
                <th>Média</th>
                <th>Situação</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabela-notas-professor"></tbody>
    </table>

    <hr>
    <h3>Todos os Alunos Cadastrados na Escola</h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome do Aluno</th>
                <th>Tipo de Conta</th>
            </tr>
        </thead>
        <tbody id="tabela-todos-alunos">
            <tr><td colspan="3">Carregando lista...</td></tr>
        </tbody>
    </table>

    <br>
    <button onclick="fazerLogout()" style="background-color: #cc0000;">Sair do Sistema</button>
</div>

<script>
    const API_BASE = 'https://site-escola-ox6c.onrender.com/api';

    window.onload = function() {
        const user = JSON.parse(localStorage.getItem('suap_logged'));
        if (!user || user.tipo !== 'professor') {
            alert("Acesso negado!");
            window.location.href = 'index.html';
            return;
        }
        carregarAlunosCadastrados();
        carregarNotas();
    };

    // Nova função que vai buscar os alunos reais registados no banco
    async function carregarAlunosCadastrados() {
        try {
            // Criaremos esta rota no server.js para listar os utilizadores tipo aluno
            const response = await fetch(`${API_BASE}/alunos`);
            const alunos = await response.json();
            
            const select = document.getElementById('nota-aluno');
            const tbodyAlunos = document.getElementById('tabela-todos-alunos');
            
            select.innerHTML = '<option value="">-- Selecione um Aluno --</option>';
            tbodyAlunos.innerHTML = '';

            if(alunos.length === 0) {
                select.innerHTML = '<option value="">Nenhum aluno cadastrado no sistema</option>';
                tbodyAlunos.innerHTML = '<tr><td colspan="3" style="text-align:center;">Nenhum aluno encontrado. Se criares uma conta de aluno no ecrã inicial, ela aparece aqui!</td></tr>';
                return;
            }

            alunos.forEach(aluno => {
                // Adiciona no Dropdown de escolha
                const option = document.createElement('option');
                option.value = aluno.nome;
                option.textContent = aluno.nome;
                select.appendChild(option);

                // Adiciona na tabela de consulta em baixo
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${aluno.id}</td>
                    <td><strong>${aluno.nome}</strong></td>
                    <td><span style="background:#e2e8f0; padding:3px 8px; border-radius:12px; font-size:12px;">${aluno.tipo}</span></td>
                `;
                tbodyAlunos.appendChild(tr);
            });
        } catch (e) {
            console.error(e);
        }
    }

    async function carregarNotas() {
        try {
            const response = await fetch(`${API_BASE}/notas`);
            const notas = await response.json();
            const tbody = document.getElementById('tabela-notas-professor');
            tbody.innerHTML = '';

            notas.forEach(nota => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${nota.aluno}</td>
                    <td>${nota.materia}</td>
                    <td>${nota.n1.toFixed(1)}</td>
                    <td>${nota.n2.toFixed(1)}</td>
                    <td>${nota.media.toFixed(1)}</td>
                    <td style="color: ${nota.situacao === 'APROVADO' ? 'green' : 'red'}; font-weight: bold;">${nota.situacao}</td>
                    <td><button onclick="apagarNota(${nota.id})" style="background-color: #ff3333; padding: 2px 8px;">🗑️</button></td>
                `;
                tbody.appendChild(tr);
            });
        } catch (e) {}
    }

    async function professorSalvarNota() {
        const aluno = document.getElementById('nota-aluno').value;
        const materia = document.getElementById('nota-materia').value.trim();
        const n1 = document.getElementById('nota-n1').value;
        const n2 = document.getElementById('nota-n2').value;

        if (!aluno || !materia || n1 === '' || n2 === '') {
            return alert("Por favor, preencha todos os campos.");
        }

        try {
            const response = await fetch(`${API_BASE}/notas`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ aluno, materia, n1: parseFloat(n1), n2: parseFloat(n2) })
            });
            const dados = await response.json();
            alert(dados.mensagem || "Nota processada!");
            carregarNotas();
        } catch (e) {
            alert("Erro de conexão.");
        }
    }

    async function apagarNota(id) {
        if (!confirm("Apagar nota?")) return;
        await fetch(`${API_BASE}/notas/${id}`, { method: 'DELETE' });
        carregarNotas();
    }

    function fazerLogout() {
        localStorage.removeItem('suap_logged');
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
